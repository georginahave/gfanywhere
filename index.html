<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GF Anywhere — Find Restaurants Near You</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --ink: #0f0d0a; --cream: #f5f0e8; --warm: #f0e6d0; --accent: #c8472a; --gold: #d4a843; --muted: #8a7f72; --card-bg: #fdfaf4; --border: #e0d8ca; }
  html { scroll-behavior: smooth; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; overflow-x: hidden; }

  header { background: var(--ink); padding: 0; position: relative; overflow: hidden; }
  .header-texture { position: absolute; inset: 0; background-image: radial-gradient(circle at 20% 50%, rgba(200,71,42,0.15) 0%, transparent 60%), radial-gradient(circle at 80% 20%, rgba(212,168,67,0.1) 0%, transparent 50%); pointer-events: none; }
  .header-inner { max-width: 1100px; margin: 0 auto; padding: 48px 32px 40px; position: relative; z-index: 1; }
  .logo { font-family: 'Playfair Display', serif; font-size: clamp(2.8rem, 6vw, 5rem); font-weight: 900; color: var(--cream); letter-spacing: -2px; line-height: 1; margin-bottom: 6px; }
  .logo span { color: var(--accent); }
  .tagline { font-size: 0.95rem; color: var(--muted); font-weight: 300; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 36px; }

  .search-wrap { display: flex; max-width: 680px; background: var(--cream); border-radius: 4px; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.4); }
  .search-group { display: flex; flex: 1; flex-wrap: wrap; }
  .search-input { flex: 1 1 200px; padding: 16px 20px; border: none; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; color: var(--ink); outline: none; min-width: 0; }
  .search-input::placeholder { color: var(--muted); }
  .divider { width: 1px; background: var(--border); margin: 10px 0; }
  .search-btn { padding: 16px 28px; background: var(--accent); color: white; border: none; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
  .search-btn:hover { background: #a8381f; }
  .search-btn:disabled { background: var(--muted); cursor: not-allowed; }

  /* CONTROLS */
  .controls-bar { background: var(--card-bg); border-bottom: 1px solid var(--border); display: none; }
  .controls-inner { max-width: 1100px; margin: 0 auto; padding: 14px 32px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; justify-content: space-between; }
  .controls-left { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .controls-right { display: flex; gap: 8px; align-items: center; }
  .filter-group { display: flex; gap: 5px; align-items: center; }
  .filter-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); white-space: nowrap; margin-right: 2px; }
  .filter-btn { padding: 5px 13px; border: 1.5px solid var(--border); background: white; border-radius: 100px; font-family: 'DM Sans', sans-serif; font-size: 0.79rem; color: var(--muted); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(200,71,42,0.05); }
  .filter-btn.open-active { border-color: #2d7a2d; color: #2d7a2d; background: rgba(80,180,80,0.08); }
  .sep { width: 1px; height: 22px; background: var(--border); }
  .sort-select { padding: 5px 12px; border: 1.5px solid var(--border); border-radius: 100px; font-family: 'DM Sans', sans-serif; font-size: 0.79rem; color: var(--muted); background: white; cursor: pointer; outline: none; }
  .sort-select:focus { border-color: var(--accent); }
  .view-toggle { display: flex; border: 1.5px solid var(--border); border-radius: 100px; overflow: hidden; }
  .view-btn { padding: 5px 13px; border: none; background: white; font-family: 'DM Sans', sans-serif; font-size: 0.79rem; color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .view-btn.active { background: var(--ink); color: white; }

  main { max-width: 1100px; margin: 0 auto; padding: 32px 32px 80px; }

  .status { text-align: center; padding: 80px 20px; color: var(--muted); }
  .status-icon { font-size: 3rem; margin-bottom: 16px; display: block; opacity: 0.4; }
  .status h2 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--ink); margin-bottom: 8px; opacity: 0.5; }
  .status p { font-size: 0.9rem; }

  .results-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 2px solid var(--ink); }
  .results-title { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; }
  .results-count { font-size: 0.85rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

  /* MAP */
  #mapContainer { display: none; margin-bottom: 28px; border-radius: 4px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  #map { height: 420px; width: 100%; }
  .leaflet-popup-content-wrapper { border-radius: 4px !important; font-family: 'DM Sans', sans-serif; }
  .map-popup-name { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
  .map-popup-meta { font-size: 0.8rem; color: var(--muted); }
  .map-popup-open { font-size: 0.75rem; font-weight: 500; }
  .map-popup-open.open { color: #2d7a2d; }
  .map-popup-open.closed { color: var(--accent); }

  /* GRID */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
  .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 2px; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; animation: fadeUp 0.4s ease both; }
  .card:hover { transform: translateY(-4px); box-shadow: 0 16px 48px rgba(15,13,10,0.12); }
  .card.highlighted { box-shadow: 0 0 0 2px var(--accent), 0 16px 48px rgba(200,71,42,0.2) !important; transform: translateY(-4px); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .card-img { width: 100%; height: 200px; object-fit: cover; display: block; background: var(--warm); }
  .card-img-placeholder { width: 100%; height: 200px; background: linear-gradient(135deg, var(--warm), var(--border)); display: flex; align-items: center; justify-content: center; font-size: 3rem; opacity: 0.4; }
  .card-body { padding: 20px; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 8px; }
  .card-name { font-family: 'Playfair Display', serif; font-size: 1.15rem; font-weight: 700; line-height: 1.2; flex: 1; }
  .price { font-size: 0.8rem; color: var(--muted); white-space: nowrap; margin-top: 3px; }
  .rating-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .stars { display: flex; gap: 2px; }
  .star { font-size: 0.85rem; color: var(--border); }
  .star.filled { color: var(--gold); }
  .star.half { color: var(--gold); opacity: 0.6; }
  .rating-num { font-size: 0.85rem; font-weight: 500; }
  .rating-count { font-size: 0.78rem; color: var(--muted); }
  .open-badge { font-size: 0.7rem; font-weight: 500; padding: 2px 8px; border-radius: 100px; letter-spacing: 0.5px; text-transform: uppercase; }
  .open-badge.open { background: rgba(80,180,80,0.15); color: #2d7a2d; }
  .open-badge.closed { background: rgba(200,71,42,0.12); color: var(--accent); }
  .address { font-size: 0.8rem; color: var(--muted); margin-bottom: 14px; line-height: 1.4; }

  .reviews-section { border-top: 1px solid var(--border); padding-top: 14px; margin-top: 14px; }
  .reviews-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 10px; }
  .review { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .review:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .review-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .reviewer-avatar { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; background: var(--warm); }
  .reviewer-name { font-size: 0.78rem; font-weight: 500; }
  .review-time { font-size: 0.72rem; color: var(--muted); margin-left: auto; }
  .review-stars { display: flex; gap: 1px; margin-bottom: 4px; }
  .review-star { font-size: 0.65rem; color: var(--gold); }
  .review-star.empty { color: var(--border); }
  .review-text { font-size: 0.8rem; color: #4a4540; line-height: 1.5; }
  .review-text.collapsed { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .review-expand-btn { font-size: 0.72rem; color: var(--accent); background: none; border: none; cursor: pointer; padding: 4px 0 0; font-family: 'DM Sans', sans-serif; font-weight: 500; }
  .review-expand-btn:hover { text-decoration: underline; }
  .description-match { font-size: 0.8rem; color: #4a4540; line-height: 1.5; margin-bottom: 10px; padding: 8px 10px; background: rgba(212,168,67,0.1); border-left: 2px solid var(--gold); border-radius: 0 2px 2px 0; }

  .card-actions { display: flex; gap: 8px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .action-link { flex: 1; text-align: center; padding: 8px; font-size: 0.75rem; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; text-decoration: none; border: 1.5px solid var(--border); color: var(--muted); border-radius: 2px; transition: all 0.15s; }
  .action-link:hover { border-color: var(--accent); color: var(--accent); }

  /* REVIEW KEYWORD FILTER */
  .keyword-bar { background: rgba(200,71,42,0.04); border-bottom: 1px solid var(--border); display: none; }
  .keyword-inner { max-width: 1100px; margin: 0 auto; padding: 12px 32px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .keyword-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent); white-space: nowrap; font-weight: 500; }
  .keyword-chip { padding: 5px 13px; border: 1.5px solid rgba(200,71,42,0.3); background: white; border-radius: 100px; font-family: 'DM Sans', sans-serif; font-size: 0.79rem; color: var(--accent); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .keyword-chip:hover { background: rgba(200,71,42,0.08); border-color: var(--accent); }
  .keyword-chip.active { background: var(--accent); color: white; border-color: var(--accent); }
  .keyword-input-wrap { display: flex; align-items: center; gap: 0; border: 1.5px solid rgba(200,71,42,0.3); border-radius: 100px; overflow: hidden; background: white; }
  .keyword-custom-input { padding: 5px 12px; border: none; font-family: 'DM Sans', sans-serif; font-size: 0.79rem; color: var(--ink); outline: none; background: transparent; width: 140px; }
  .keyword-custom-input::placeholder { color: var(--muted); }
  .keyword-add-btn { padding: 5px 12px; background: none; border: none; color: var(--accent); font-size: 0.79rem; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; white-space: nowrap; }
  .keyword-add-btn:hover { background: rgba(200,71,42,0.08); }
  .keyword-clear { padding: 5px 12px; border: 1.5px solid var(--border); background: white; border-radius: 100px; font-family: 'DM Sans', sans-serif; font-size: 0.79rem; color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .keyword-clear:hover { border-color: var(--ink); color: var(--ink); }

  /* keyword match badge on card */
  .keyword-match-badge { display: inline-flex; align-items: center; gap: 4px; background: rgba(200,71,42,0.1); border: 1px solid rgba(200,71,42,0.25); color: var(--accent); font-size: 0.72rem; font-weight: 500; padding: 3px 10px; border-radius: 100px; margin-bottom: 10px; }
  .keyword-match-badge span { font-weight: 700; }

  /* highlight matched text in reviews */
  mark.kw { background: rgba(212,168,67,0.35); border-radius: 2px; padding: 0 1px; font-style: normal; font-weight: 700; }

  .review-text { font-size: 0.8rem; color: #4a4540; line-height: 1.5; }

  .loading { display: flex; flex-direction: column; align-items: center; padding: 80px 20px; gap: 16px; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--muted); font-style: italic; }
  .error-msg { background: rgba(200,71,42,0.08); border: 1px solid rgba(200,71,42,0.2); border-radius: 4px; padding: 20px 24px; color: var(--accent); font-size: 0.9rem; }

  @media (max-width: 700px) {
    .header-inner { padding: 32px 20px 28px; }
    .search-wrap { flex-direction: column; }
    .search-btn { padding: 14px; }
    main { padding: 24px 16px 60px; }
    .controls-inner { padding: 12px 16px; }
    .grid { grid-template-columns: 1fr; }
    #map { height: 300px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-texture"></div>
  <div class="header-inner">
    <div class="logo">GF <span>Anywhere</span></div>
    <div class="tagline">Gluten-free dining, wherever you are.</div>
    <div class="search-wrap">
      <div class="search-group">
        <input class="search-input" id="locationInput" type="text" placeholder="City, neighborhood, or zip code…"/>
        <div class="divider"></div>
        <input class="search-input" id="keywordInput" type="text" placeholder="Cuisine type (optional)…"/>
      </div>
      <button class="search-btn" id="searchBtn" onclick="doSearch()">Search</button>
    </div>
  </div>
</header>

<div class="controls-bar" id="controlsBar">
  <div class="controls-inner">
    <div class="controls-left">
      <div class="filter-group">
        <span class="filter-label">Rating:</span>
        <button class="filter-btn active" data-min="0" onclick="setRating(this)">All</button>
        <button class="filter-btn" data-min="4.5" onclick="setRating(this)">⭐ 4.5+</button>
        <button class="filter-btn" data-min="4" onclick="setRating(this)">⭐ 4.0+</button>
        <button class="filter-btn" data-min="3.5" onclick="setRating(this)">⭐ 3.5+</button>
      </div>
      <div class="sep"></div>
      <div class="filter-group">
        <span class="filter-label">Price:</span>
        <button class="filter-btn active" data-price="0" onclick="setPrice(this)">All</button>
        <button class="filter-btn" data-price="1" onclick="setPrice(this)">$</button>
        <button class="filter-btn" data-price="2" onclick="setPrice(this)">$$</button>
        <button class="filter-btn" data-price="3" onclick="setPrice(this)">$$$</button>
        <button class="filter-btn" data-price="4" onclick="setPrice(this)">$$$$</button>
      </div>
      <div class="sep"></div>
      <button class="filter-btn" id="openNowBtn" onclick="toggleOpenNow()">🟢 Open Now</button>
    </div>
    <div class="controls-right">
      <span class="filter-label">Sort:</span>
      <select class="sort-select" id="sortSelect" onchange="applyFilters()">
        <option value="default">Best Match</option>
        <option value="rating">Highest Rated</option>
        <option value="reviews">Most Reviewed</option>
      </select>
      <div class="sep"></div>
      <div class="view-toggle">
        <button class="view-btn active" id="viewGrid" onclick="setView('grid')">⊞ Grid</button>
        <button class="view-btn" id="viewMap" onclick="setView('map')">🗺 Map</button>
      </div>
    </div>
  </div>
</div>

<!-- REVIEW KEYWORD FILTER BAR -->
<div class="keyword-bar" id="keywordBar">
  <div class="keyword-inner">
    <span class="keyword-label">🔎 Filter reviews by:</span>
    <button class="keyword-chip" data-kw="gluten-free" onclick="toggleKeywordChip(this)">gluten-free</button>
    <button class="keyword-chip" data-kw="gluten free" onclick="toggleKeywordChip(this)">gluten free</button>
    <button class="keyword-chip" data-kw="gluten" onclick="toggleKeywordChip(this)">gluten</button>
    <button class="keyword-chip" data-kw="celiac" onclick="toggleKeywordChip(this)">celiac</button>
    <button class="keyword-chip" data-kw="vegan" onclick="toggleKeywordChip(this)">vegan</button>
    <button class="keyword-chip" data-kw="dairy" onclick="toggleKeywordChip(this)">dairy</button>
    <button class="keyword-chip" data-kw="peanut" onclick="toggleKeywordChip(this)">peanut</button>
    <div class="keyword-input-wrap">
      <input class="keyword-custom-input" id="customKeywordInput" type="text" placeholder="Custom keyword…"/>
      <button class="keyword-add-btn" onclick="addCustomKeyword()">+ Add</button>
    </div>
    <button class="keyword-clear" id="keywordClearBtn" onclick="clearKeywords()" style="display:none">✕ Clear</button>
  </div>
</div>

<main>
  <div class="status" id="statusEl">
    <span class="status-icon">🍽️</span>
    <h2>Hungry for something good?</h2>
    <p>Enter a location above to discover top-rated restaurants with real reviews.</p>
  </div>
  <div id="resultsContainer"></div>
</main>

<script>
  let allResults = [], activeMin = 0, activePrice = 0, openNowOnly = false, currentView = 'grid';
  let mapInstance = null, currentLocation = '', currentKeyword = '';
  let activeKeywords = new Set();

  document.getElementById('locationInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
  document.getElementById('keywordInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

  async function doSearch() {
    const location = document.getElementById('locationInput').value.trim();
    const keyword = document.getElementById('keywordInput').value.trim();
    if (!location) { document.getElementById('locationInput').focus(); return; }
    currentLocation = location; currentKeyword = keyword;

    const btn = document.getElementById('searchBtn');
    btn.disabled = true; btn.textContent = 'Searching…';
    document.getElementById('controlsBar').style.display = 'none';
    document.getElementById('statusEl').style.display = 'none';
    document.getElementById('resultsContainer').innerHTML = `<div class="loading"><div class="spinner"></div><div class="loading-text">Finding the best spots in ${escHtml(location)}…</div></div>`;

    try {
      const params = new URLSearchParams({ location });
      if (keyword) params.append('keyword', keyword);
      const res = await fetch(`/api/search?${params}`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || data.error || 'Search failed');

      allResults = data.results || [];
      activeMin = 0; activePrice = 0; openNowOnly = false;
      document.querySelectorAll('[data-min]').forEach(b => b.classList.toggle('active', b.dataset.min === '0'));
      document.querySelectorAll('[data-price]').forEach(b => b.classList.toggle('active', b.dataset.price === '0'));
      document.getElementById('openNowBtn').classList.remove('open-active');
      document.getElementById('sortSelect').value = 'default';
      document.getElementById('controlsBar').style.display = allResults.length ? 'block' : 'none';
      document.getElementById('keywordBar').style.display = allResults.length ? 'block' : 'none';
      activeKeywords.clear();
      document.querySelectorAll('.keyword-chip').forEach(c => c.classList.remove('active'));
      document.getElementById('keywordClearBtn').style.display = 'none';
      applyFilters();
    } catch (err) {
      document.getElementById('resultsContainer').innerHTML = `<div class="error-msg">⚠️ ${escHtml(err.message)}. Please check your location and try again.</div>`;
    } finally {
      btn.disabled = false; btn.textContent = 'Search';
    }
  }

  function setRating(btn) {
    activeMin = parseFloat(btn.dataset.min);
    document.querySelectorAll('[data-min]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); applyFilters();
  }

  function setPrice(btn) {
    activePrice = parseInt(btn.dataset.price);
    document.querySelectorAll('[data-price]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); applyFilters();
  }

  function toggleOpenNow() {
    openNowOnly = !openNowOnly;
    document.getElementById('openNowBtn').classList.toggle('open-active', openNowOnly);
    applyFilters();
  }

  function setView(v) {
    currentView = v;
    document.getElementById('viewGrid').classList.toggle('active', v === 'grid');
    document.getElementById('viewMap').classList.toggle('active', v === 'map');
    applyFilters();
  }

  function toggleKeywordChip(btn) {
    const kw = btn.dataset.kw;
    if (activeKeywords.has(kw)) { activeKeywords.delete(kw); btn.classList.remove('active'); }
    else { activeKeywords.add(kw); btn.classList.add('active'); }
    document.getElementById('keywordClearBtn').style.display = activeKeywords.size ? 'inline-block' : 'none';
    applyFilters();
  }

  function addCustomKeyword() {
    const input = document.getElementById('customKeywordInput');
    const val = input.value.trim().toLowerCase();
    if (!val) return;
    // Check if chip already exists
    let existing = document.querySelector(`.keyword-chip[data-kw="${val}"]`);
    if (!existing) {
      const chip = document.createElement('button');
      chip.className = 'keyword-chip active';
      chip.dataset.kw = val;
      chip.textContent = val;
      chip.onclick = function() { toggleKeywordChip(this); };
      document.getElementById('keywordClearBtn').before(chip);
      existing = chip;
    }
    activeKeywords.add(val);
    existing.classList.add('active');
    input.value = '';
    document.getElementById('keywordClearBtn').style.display = 'inline-block';
    applyFilters();
  }

  function clearKeywords() {
    activeKeywords.clear();
    document.querySelectorAll('.keyword-chip').forEach(c => c.classList.remove('active'));
    document.getElementById('keywordClearBtn').style.display = 'none';
    applyFilters();
  }

  document.getElementById('customKeywordInput').addEventListener('keydown', e => { if (e.key === 'Enter') addCustomKeyword(); });

  function highlightKeywords(text, keywords) {
    if (!keywords.size || !text) return escHtml(text);
    // Sort by length desc to match longer phrases first
    const sorted = [...keywords].sort((a, b) => b.length - a.length);
    const escaped = escHtml(text);
    let result = escaped;
    for (const kw of sorted) {
      const safe = escHtml(kw).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const regex = new RegExp(`(${safe})`, 'gi');
      result = result.replace(regex, '<mark class="kw">$1</mark>');
    }
    return result;
  }

  function toggleReview(uid, btn) {
    const el = document.getElementById(uid);
    if (!el) return;
    const collapsed = el.classList.toggle('collapsed');
    btn.textContent = collapsed ? 'Show more' : 'Show less';
  }

  function getMatchingReviews(reviews, keywords) {
    if (!keywords.size) return reviews || [];
    return (reviews || []).filter(rv =>
      [...keywords].some(kw => (rv.text || '').toLowerCase().includes(kw))
    );
  }

  function restaurantMatchesKeywords(r, keywords) {
    if (!keywords.size) return true;
    // Match on review text, restaurant name, or description
    const nameDesc = [(r.name || ''), (r.description || '')].join(' ').toLowerCase();
    const nameDescMatch = [...keywords].some(kw => nameDesc.includes(kw));
    const reviewMatch = (r.reviews || []).some(rv =>
      [...keywords].some(kw => (rv.text || '').toLowerCase().includes(kw))
    );
    return nameDescMatch || reviewMatch;
  }

  function countKeywordMatches(r, keywords) {
    if (!keywords.size) return 0;
    // Count matches in reviews, name, and description
    const haystack = [
      ...(r.reviews || []).map(rv => rv.text || ''),
      r.name || '',
      r.description || '',
    ].join(' ').toLowerCase();
    let count = 0;
    for (const kw of keywords) {
      let pos = 0;
      while ((pos = haystack.indexOf(kw, pos)) !== -1) { count++; pos += kw.length; }
    }
    return count;
  }

  function applyFilters() {
    let filtered = allResults.filter(r => {
      if ((r.rating || 0) < activeMin) return false;
      if (activePrice > 0 && r.price_level !== activePrice) return false;
      if (openNowOnly && r.is_open !== true) return false;
      if (!restaurantMatchesKeywords(r, activeKeywords)) return false;
      return true;
    });
    const sort = document.getElementById('sortSelect').value;
    if (sort === 'rating') filtered.sort((a, b) => (b.rating || 0) - (a.rating || 0));
    else if (sort === 'reviews') filtered.sort((a, b) => (b.user_ratings_total || 0) - (a.user_ratings_total || 0));
    renderResults(filtered);
  }

  function renderResults(filtered) {
    const container = document.getElementById('resultsContainer');
    if (!filtered.length) {
      container.innerHTML = `<div class="status"><span class="status-icon">🔍</span><h2>No results found</h2><p>Try adjusting your filters.</p></div>`;
      return;
    }
    const title = currentKeyword ? `${currentKeyword} in ${currentLocation}` : `Restaurants in ${currentLocation}`;
    container.innerHTML = `
      <div class="results-header">
        <div class="results-title">${escHtml(title)}</div>
        <div class="results-count">${filtered.length} place${filtered.length !== 1 ? 's' : ''} found</div>
      </div>
      <div id="mapContainer"><div id="map"></div></div>
      <div class="grid" id="cardGrid"></div>`;

    if (currentView === 'map') {
      document.getElementById('mapContainer').style.display = 'block';
      document.getElementById('cardGrid').style.display = 'grid';
      renderMap(filtered);
    }

    const grid = document.getElementById('cardGrid');
    filtered.forEach((r, i) => grid.appendChild(buildCard(r, i)));
  }

  function renderMap(places) {
    if (mapInstance) { mapInstance.remove(); mapInstance = null; }
    const valid = places.filter(p => p.lat && p.lng);
    if (!valid.length) return;

    mapInstance = L.map('map').setView([valid[0].lat, valid[0].lng], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap contributors' }).addTo(mapInstance);

    const icon = L.divIcon({
      html: `<div style="width:20px;height:20px;background:#c8472a;border:3px solid white;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.35)"></div>`,
      iconSize: [20,20], iconAnchor: [10,10], popupAnchor: [0,-12], className: ''
    });

    valid.forEach((r, i) => {
      const openStr = r.is_open === true ? '<div class="map-popup-open open">● Open now</div>'
        : r.is_open === false ? '<div class="map-popup-open closed">● Closed</div>' : '';
      const price = r.price_level ? '$'.repeat(r.price_level) : '';
      L.marker([r.lat, r.lng], { icon })
        .addTo(mapInstance)
        .bindPopup(`<div style="min-width:150px"><div class="map-popup-name">${escHtml(r.name)}</div><div class="map-popup-meta">⭐ ${r.rating?.toFixed(1) || '—'} ${price ? '· ' + price : ''}</div>${openStr}</div>`)
        .on('click', () => {
          const card = document.getElementById(`card-${i}`);
          if (card) { card.scrollIntoView({ behavior:'smooth', block:'center' }); card.classList.add('highlighted'); setTimeout(() => card.classList.remove('highlighted'), 1800); }
        });
    });

    if (valid.length > 1) mapInstance.fitBounds(L.latLngBounds(valid.map(p => [p.lat, p.lng])), { padding: [40,40] });
  }

  function buildCard(r, index) {
    const card = document.createElement('div');
    card.className = 'card'; card.id = `card-${index}`;
    card.style.animationDelay = `${index * 50}ms`;

    const price = r.price_level ? '$'.repeat(r.price_level) : '';
    const openBadge = r.is_open === true ? '<span class="open-badge open">Open</span>' : r.is_open === false ? '<span class="open-badge closed">Closed</span>' : '';
    const imgHtml = r.photo_ref
      ? `<img class="card-img" src="/api/photo?ref=${encodeURIComponent(r.photo_ref)}" alt="${escHtml(r.name)}" loading="lazy" onerror="this.outerHTML='<div class=\\'card-img-placeholder\\'>🍴</div>'">`
      : `<div class="card-img-placeholder">🍴</div>`;

    const reviewsToShow = activeKeywords.size ? getMatchingReviews(r.reviews, activeKeywords) : (r.reviews || []);
    const matchCount = activeKeywords.size ? countKeywordMatches(r, activeKeywords) : 0;
    const matchBadge = (activeKeywords.size && matchCount > 0)
      ? `<div class="keyword-match-badge">🔎 <span>${matchCount}</span> mention${matchCount !== 1 ? 's' : ''} of "${[...activeKeywords].join('", "')}"</div>` : '';

    // Description match
    const descMatch = (activeKeywords.size && r.description && [...activeKeywords].some(kw => r.description.toLowerCase().includes(kw)))
      ? `<div class="description-match">${highlightKeywords(r.description, activeKeywords)}</div>` : '';

    const reviewsHtml = reviewsToShow.length ? `
      <div class="reviews-section">
        <div class="reviews-label">${activeKeywords.size ? 'Matching Reviews' : 'Recent Reviews'}</div>
        ${reviewsToShow.map((rv, ri) => {
          const uid = `rv-${index}-${ri}`;
          return `<div class="review">
            <div class="review-top">
              <img class="reviewer-avatar" src="${escHtml(rv.profile_photo||'')}" alt="" onerror="this.style.display='none'">
              <span class="reviewer-name">${escHtml(rv.author)}</span>
              <span class="review-time">${escHtml(rv.time)}</span>
            </div>
            <div class="review-stars">${Array.from({length:5},(_,i)=>`<span class="review-star${i<rv.rating?'':' empty'}">★</span>`).join('')}</div>
            <div class="review-text collapsed" id="${uid}">${highlightKeywords(rv.text, activeKeywords)}</div>
            <button class="review-expand-btn" onclick="toggleReview('${uid}', this)">Show more</button>
          </div>`;
        }).join('')}
      </div>` : '';

    const actionsHtml = (r.website||r.phone) ? `
      <div class="card-actions">
        ${r.website?`<a class="action-link" href="${escHtml(r.website)}" target="_blank" rel="noopener">Website</a>`:''}
        ${r.phone?`<a class="action-link" href="tel:${escHtml(r.phone)}">${escHtml(r.phone)}</a>`:''}
      </div>` : '';

    card.innerHTML = `${imgHtml}
      <div class="card-body">
        <div class="card-header"><div class="card-name">${activeKeywords.size ? highlightKeywords(r.name, activeKeywords) : escHtml(r.name)}</div><div class="price">${price}</div></div>
        <div class="rating-row">
          <div class="stars">${Array.from({length:5},(_,i)=>`<span class="star${i+1<=Math.floor(r.rating||0)?' filled':i<(r.rating||0)?' half':''}">★</span>`).join('')}</div>
          <span class="rating-num">${r.rating?.toFixed(1)||'—'}</span>
          <span class="rating-count">(${(r.user_ratings_total||0).toLocaleString()})</span>
          ${openBadge}
        </div>
        <div class="address">${escHtml(r.address||'')}</div>
        ${matchBadge}${descMatch}${reviewsHtml}${actionsHtml}
      </div>`;
    return card;
  }

  function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
